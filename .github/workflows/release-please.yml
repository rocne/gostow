name: Release please

# Curated, semver-correct release path. On every push to main, release-please
# reads the Conventional Commit history and maintains a standing "release PR"
# (next version + CHANGELOG). Merging that release PR is the human gate: it
# creates the tag + GitHub release, then this workflow delegates the artifact
# build to rocne/release-ci's reusable workflow — in the SAME run, so no PAT is needed
# (an API-created tag would not trigger the tag-push release.yml on its own).
#
# release.yml (tag push) remains as a manual break-glass path.
#
# Requires repo setting: Actions → General → "Allow GitHub Actions to create and
# approve pull requests" = ON. Without it release-please cannot open the release PR.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      pr: ${{ steps.rp.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ci.yml's version-guard CANNOT see release-please's release PR: GitHub does
  # not trigger `pull_request` (or `pull_request_target`) workflows for PRs
  # opened with GITHUB_TOKEN, to prevent recursion. So the release PR — the one
  # PR whose version actually matters — arrives with zero checks. Guard it here
  # instead, inside the run that created it.
  guard-release-pr:
    needs: release-please
    if: needs.release-please.outputs.pr != ''
    runs-on: ubuntu-latest
    steps:
      - name: Refuse a release PR proposing 1.0.0 or later
        env:
          PR_JSON: ${{ needs.release-please.outputs.pr }}
        run: |
          title=$(printf '%s' "$PR_JSON" | jq -er '.title')
          echo "release PR title: $title"
          version="${title##* }"
          case "$version" in
            0.*) echo "ok: $version is pre-1.0" ;;
            *)
              echo "::error::release PR proposes $version — gostow stays pre-1.0 until the stow engine is complete"
              exit 1
              ;;
          esac

  # Last line of defence before artifacts ship. ci.yml's version-guard already
  # fails the release PR if the manifest reaches 1.0.0, so by the time we get
  # here the tag should always be v0.x. If it isn't, the tag and GitHub release
  # already exist (release-please made them) — but nothing is built, signed, or
  # published to Cloudsmith/Homebrew, which is the part that can't be taken back.
  guard-pre-1-0:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Refuse to publish 1.0.0 or later
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          case "$TAG" in
            v0.*) echo "ok: $TAG is pre-1.0" ;;
            *)
              echo "::error::refusing to publish $TAG — gostow stays pre-1.0 until the stow engine is complete"
              exit 1
              ;;
          esac

  release:
    needs: [release-please, guard-pre-1-0]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
      issues: write
      id-token: write
      attestations: write
    uses: rocne/release-ci/.github/workflows/release.yml@v0.1.1
    with:
      version: ${{ needs.release-please.outputs.tag_name }}
      goreleaser_config: .goreleaser/gostow.yaml
      project_name: gostow
      binary: gostow
    secrets: inherit
