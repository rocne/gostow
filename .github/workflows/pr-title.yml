name: PR title

# Enforce Conventional Commit PR titles. PRs are squash-merged, so the PR title
# becomes the commit subject on main — which is exactly what release-please reads
# to decide the next version and build the changelog. A malformed title would
# silently drop a change from release automation, so guard it here.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
