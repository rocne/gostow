name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # gostow must stay pre-1.0 until the engine is complete: a v1 tag is a promise
  # of GNU Stow parity we have not earned yet.
  #
  # Two distinct mechanisms could produce a v1, and `bump-minor-pre-major` stops
  # neither on its own:
  #
  #   1. No prior release => release-please takes the INITIAL-release path and
  #      returns `initial-version`, defaulting to 1.0.0 (strategies/base.ts). The
  #      bump clamp is never consulted, because nothing is being bumped. Fixed by
  #      pinning "initial-version": "0.1.0" in release-please-config.json.
  #   2. A `Release-As: 1.0.0` commit footer short-circuits the whole versioning
  #      strategy; so does flipping the clamp off, or editing the manifest.
  #
  # This job catches (2) for HUMAN pull requests. It does NOT see release-please's
  # own release PR — GITHUB_TOKEN-authored PRs never trigger `pull_request`
  # workflows — so that PR is guarded inside release-please.yml, and the tag is
  # guarded again in both release workflows before anything is published.
  version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Refuse a 1.0.0-or-later version
        run: |
          v=$(jq -er '."."' .release-please-manifest.json)
          echo "manifest version: $v"
          case "$v" in
            0.*) echo "ok: $v is pre-1.0" ;;
            *)
              echo "::error::refusing $v — gostow stays pre-1.0 until the stow engine is complete"
              exit 1
              ;;
          esac

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  # Differential conformance against real GNU Stow. The spec IS stow's behaviour
  # at the pinned version (docs/SPEC.md §1), so the oracle must be that exact
  # version — Ubuntu 24.04's `apt install stow` gives 2.3.1 and would silently
  # redefine the spec. Build the checksum-pinned tarball instead.
  #
  # The hermetic half of the suite (checked-in goldens) runs in `test` above with
  # no Perl at all; this job is what keeps those goldens honest.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install build deps for the oracle
        run: sudo apt-get update && sudo apt-get install -y texinfo

      - name: Build + install pinned GNU Stow oracle
        run: sudo bash test/install-stow-oracle.sh

      - name: Conformance tests (differential vs real stow)
        run: go test -tags oracle ./...
