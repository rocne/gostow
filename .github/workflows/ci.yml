name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # gostow must stay pre-1.0 until the engine is complete: a v1 tag is a promise
  # of GNU Stow parity we have not earned yet.
  #
  # Two distinct mechanisms could produce a v1, and `bump-minor-pre-major` stops
  # neither on its own:
  #
  #   1. No prior release => release-please takes the INITIAL-release path and
  #      returns `initial-version`, defaulting to 1.0.0 (strategies/base.ts). The
  #      bump clamp is never consulted, because nothing is being bumped. Fixed by
  #      pinning "initial-version": "0.1.0" in release-please-config.json.
  #   2. A `Release-As: 1.0.0` commit footer short-circuits the whole versioning
  #      strategy; so does flipping the clamp off, or editing the manifest.
  #
  # This job catches (2) for HUMAN pull requests. It does NOT see release-please's
  # own release PR — GITHUB_TOKEN-authored PRs never trigger `pull_request`
  # workflows — so that PR is guarded inside release-please.yml, and the tag is
  # guarded again in both release workflows before anything is published.
  version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Refuse a 1.0.0-or-later version
        run: |
          v=$(jq -er '."."' .release-please-manifest.json)
          echo "manifest version: $v"
          case "$v" in
            0.*) echo "ok: $v is pre-1.0" ;;
            *)
              echo "::error::refusing $v — gostow stays pre-1.0 until the stow engine is complete"
              exit 1
              ;;
          esac

  # The hermetic suite, on every platform we ship a binary for.
  #
  # GoReleaser builds linux+darwin x amd64+arm64, and until now CI only ever ran
  # linux/amd64: three of the four artefacts were published untested. That is not
  # a theoretical gap. The engine canonicalises paths with filepath.EvalSymlinks,
  # and on macOS /tmp is itself a symlink to /private/tmp — precisely the kind of
  # difference a symlink farm notices and a linux runner never sees.
  #
  # macos-latest is arm64 and ubuntu-24.04-arm is linux/arm64, so both axes are
  # exercised without a fourth runner. fail-fast is off: a darwin failure must
  # not hide a linux one.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # -count=1 disables the result cache. The harness reaches its oracles
      # through subprocesses, and `go test` cannot see a subprocess's inputs, so
      # a cached PASS can outlive the thing it tested. internal/conformance
      # registers those inputs explicitly (TrackOracleInput) to make caching
      # correct; this makes it moot. A result that gates a release should be
      # produced, not recalled.
      - name: Test
        run: go test -count=1 ./...

  # Differential conformance against real GNU Stow. The spec IS stow's behaviour
  # at the pinned version (docs/SPEC.md §1), so the oracle must be that exact
  # version — Ubuntu 24.04's `apt install stow` gives 2.3.1 and would silently
  # redefine the spec. Build the checksum-pinned tarball instead.
  #
  # The hermetic half of the suite (checked-in goldens) runs in `test` above with
  # no Perl at all; this job is what keeps those goldens honest.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # texinfo builds the oracle. groff, zsh and fish check the man page and the
      # completion scripts: a completion script whose shell cannot parse it breaks
      # the user's shell startup, and neither zsh nor fish is installed by default
      # on a runner. GOSTOW_REQUIRE_DOC_TOOLS below turns a missing one into a
      # failure rather than a skip, so this list going stale cannot pass silently.
      - name: Install build deps for the oracle and the doc tooling
        run: sudo apt-get update && sudo apt-get install -y texinfo groff zsh fish

      - name: Build + install pinned GNU Stow oracle
        run: sudo bash test/install-stow-oracle.sh

      - name: Conformance tests (differential vs real stow)
        run: go test -count=1 -tags oracle ./...
        env:
          GOSTOW_REQUIRE_DOC_TOOLS: "1"
