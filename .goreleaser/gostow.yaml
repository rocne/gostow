version: 2

project_name: gostow

before:
  hooks:
    - go mod tidy
    # Debian policy wants a compressed man page, and rpm's brp-compress never
    # runs here because nfpm builds the package without rpmbuild. Compress it
    # ourselves, once, for both. The archives ship the uncompressed original.
    # man/gostow.8.gz is a build artifact and is gitignored.
    - gzip -9 --keep --force man/gostow.8

builds:
  - id: gostow
    binary: gostow
    main: ./cmd/gostow
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # Commit/date ldflags are omitted until the CLI surfaces them; injecting
    # into vars that don't exist is a silent no-op, and vars that exist but go
    # unread fail `unused` in lint.
    ldflags:
      - -s -w -X main.version={{.Env.VERSION}}

archives:
  - id: gostow
    ids: [gostow]
    name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    # Naming `files` replaces GoReleaser's defaults, which cover LICENSE and
    # README but not NOTICE. NOTICE records what gostow reproduces from GNU Stow
    # and under what reasoning; attribution that does not ship with the binary is
    # not attribution.
    #
    # The man page and completions ride along at their repo-relative paths, which
    # is what the homebrew_casks stanzas below reference.
    files:
      - LICENSE
      - NOTICE
      - README.md
      - man/gostow.8
      - completions/gostow.bash
      - completions/_gostow
      - completions/gostow.fish

nfpms:
  - id: gostow
    # Unlike dotd (binary `dotd`, package `dot-dagger`), gostow needs no
    # disambiguation: the binary and the install identity are both `gostow`.
    # `stow` itself is emphatically NOT claimed — that name belongs to GNU Stow
    # in every apt/dnf namespace, and gostow is a drop-in, not a replacement
    # package.
    package_name: gostow
    ids: [gostow]
    file_name_template: "{{ .ConventionalFileName }}"
    formats:
      - deb
      - rpm
    maintainer: Rocne Scribner <rocne.ks@gmail.com>
    homepage: https://github.com/rocne/gostow
    description: GNU Stow, reimplemented in Go — a single static binary, no Perl
    license: MIT
    bindir: /usr/bin
    # Section 8, following GNU Stow: these tools administer a directory tree, and
    # `man gostow` finds the page whatever section it lives in. The file is named
    # gostow.8, never stow.8 — the stow(8) page belongs to the `stow` package, and
    # shipping our own at that path would be a dpkg/rpm file conflict.
    #
    # The bash completion is installed as `gostow` with no extension, because that
    # filename is the lookup key: bash's loader opens the file named after the
    # command being completed. For the same reason there is no `stow` entry here.
    # The completion scripts document the one-line opt-in for a drop-in symlink.
    contents:
      - src: man/gostow.8.gz
        dst: /usr/share/man/man8/gostow.8.gz
      - src: completions/gostow.bash
        dst: /usr/share/bash-completion/completions/gostow
      - src: completions/_gostow
        dst: /usr/share/zsh/site-functions/_gostow
      - src: completions/gostow.fish
        dst: /usr/share/fish/vendor_completions.d/gostow.fish
    rpm:
      signature:
        key_file: "{{ .Env.GPG_KEY_PATH }}"
    deb:
      signature:
        key_file: "{{ .Env.GPG_KEY_PATH }}"

# A cask, not a formula, and that surprises people: casks were once GUI-only.
#
# Homebrew's Acceptable Formulae policy is explicit — "binary-only formulae should
# go in homebrew/cask" — because a formula is meant to build from source, and this
# tap ships pre-compiled binaries. GoReleaser reached the same conclusion and
# deprecated its `brews:` (formula) output in favour of `homebrew_casks:` in v2.10.
#
# The `binary` stanza it generates symlinks the executable into
# $(brew --prefix)/bin, so `brew install --cask` still puts `gostow` on PATH. Cask
# is a macOS feature; linux users take the tarball, a .deb/.rpm, or `go install`.
homebrew_casks:
  - name: gostow
    ids: [gostow]
    repository:
      owner: rocne
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/rocne/gostow
    description: GNU Stow, reimplemented in Go — a single static binary, no Perl
    license: MIT
    # Paths into the extracted archive, which is why `archives.files` above must
    # carry them. Homebrew links the manpage into its own man tree and each
    # completion into the directory its shell already searches.
    manpages:
      - man/gostow.8
    completions:
      bash: completions/gostow.bash
      zsh: completions/_gostow
      fish: completions/gostow.fish
    # Binaries are not notarized; strip the Gatekeeper quarantine xattr on install
    # so the cask-installed gostow runs without "cannot be opened" errors on macOS.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gostow"]
          end

# Publish the signed .deb/.rpm to the Cloudsmith-hosted apt/dnf repo, giving
# `apt install gostow` / `dnf install gostow` by name with auto-update.
# (GoReleaser's native `cloudsmiths` block is Pro-only, so we drive the
# cloudsmith CLI via a custom publisher instead.) Repo-index signing is handled
# server-side by Cloudsmith using the dedicated repo-signing key — separate from
# the package-signing key, which never leaves our control.
#
# Publishers iterate every linux package and archive artifact, so the command
# dispatches on extension and pushes only deb/rpm — tar.gz archives are skipped.
# any-distro/any-version makes one upload installable across every apt/dnf distro
# rather than maintaining a per-distro matrix.
publishers:
  - name: cloudsmith
    ids: [gostow]
    cmd: >-
      sh -c 'case "{{ .ArtifactName }}" in
      *.deb) exec cloudsmith push deb --republish ${CLOUDSMITH_REPO}/any-distro/any-version "{{ .ArtifactPath }}" ;;
      *.rpm) exec cloudsmith push rpm --republish ${CLOUDSMITH_REPO}/any-distro/any-version "{{ .ArtifactPath }}" ;;
      *) true ;;
      esac'
    env:
      - CLOUDSMITH_API_KEY={{ .Env.CLOUDSMITH_API_KEY }}
      - CLOUDSMITH_REPO={{ .Env.CLOUDSMITH_REPO }}

checksum:
  name_template: "{{ .ProjectName }}_{{ .Tag }}_checksums.txt"

signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"

# Attach the package-signing public key to the GitHub release so a user can
# verify a downloaded .deb/.rpm by hand.
#
#   gostow-signing-key.asc  signs the packages themselves (fpr 64894FE3…).
#                           Its private half is the GPG_PRIVATE_KEY repo secret.
#
# The apt/dnf repo INDEX is signed by a Cloudsmith-managed key (rocne/releases),
# whose public half Cloudsmith serves via its setup.deb.sh / setup.rpm.sh — so it
# is no longer committed here.
release:
  extra_files:
    - glob: ./gostow-signing-key.asc

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
